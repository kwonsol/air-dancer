<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GALLERY — AIR DANCER</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── INFO BAR ── */
    .info-bar {
      border-bottom: var(--border);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: var(--white);
    }

    .info-bar-title {
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .info-bar-count {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      opacity: 0.5;
    }

    .info-bar-spacer { flex: 1; }

    /* ── PLAZA CANVAS AREA ── */
    .plaza-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #fafafa;
      border-bottom: var(--border);
    }

    #plazaCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #plazaCanvas:active { cursor: grabbing; }

    /* click-to-place mode */
    #plazaCanvas.place-mode { cursor: crosshair; }

    /* ── SCROLLBAR ── */
    .plaza-scroll-track {
      height: 14px;
      border-top: 2px solid var(--black);
      background: #f0f0f0;
      position: relative;
      cursor: pointer;
    }

    #scrollThumb {
      position: absolute;
      top: 2px;
      height: 10px;
      min-width: 40px;
      background: var(--green);
      border: 1.5px solid var(--black);
      cursor: grab;
    }

    /* ── BOTTOM PANEL ── */
    .bottom-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      border-top: var(--border);
      background: var(--white);
      max-height: 180px;
    }

    .bottom-actions {
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-right: var(--border);
      overflow-y: auto;
    }

    .place-hint {
      font-size: 0.68rem;
      line-height: 1.6;
      letter-spacing: 0.06em;
      opacity: 0.6;
    }

    .place-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .place-x-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    #placeXInput {
      width: 80px;
      border: 2px solid var(--black);
      padding: 4px 8px;
      font-family: var(--font);
      font-size: 0.78rem;
      border-radius: 0;
      outline: none;
    }

    /* Selected dancer info panel */
    .info-panel {
      padding: 14px 18px;
      overflow-y: auto;
    }

    .info-panel-empty {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      opacity: 0.35;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .dancer-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
    }

    .di-key {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-top: 6px;
    }

    .di-val {
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .di-swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 1.5px solid #000;
      vertical-align: middle;
      margin-right: 4px;
    }

    .delete-btn {
      margin-top: 10px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: #c00;
      border-color: #c00;
      padding: 4px 10px;
    }

    .delete-btn:hover { background: #c00; color: #fff; }

    /* no dancer notice */
    .no-dancer-notice {
      border: var(--border);
      background: #fff8e0;
      padding: 10px 14px;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      body { height: auto; overflow: auto; }
      main { overflow: visible; }
      .plaza-area { height: 55vw; flex: none; }
      .bottom-layout { grid-template-columns: 1fr; max-height: none; }
      .bottom-actions { border-right: none; border-bottom: var(--border); }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="site-logo">AIR DANCER</a>
  <nav class="site-nav">
    <a href="create.html">CREATE</a>
    <a href="dance.html">DANCE</a>
    <a href="gallery.html" class="active">GALLERY</a>
  </nav>
</header>

<main>
  <!-- Info bar -->
  <div class="info-bar">
    <span class="info-bar-title">UE — 광장 PLAZA</span>
    <span class="info-bar-count" id="dancerCount">0 DANCERS</span>
    <span class="info-bar-spacer"></span>
    <span style="font-size:0.62rem; opacity:0.4; letter-spacing:0.08em;">드래그로 스크롤 · 인형 클릭으로 선택</span>
  </div>

  <!-- Plaza 3D area -->
  <div class="plaza-area">
    <div id="plazaContainer" style="width:100%; height:100%;"></div>
  </div>

  <!-- Scroll track -->
  <div class="plaza-scroll-track" id="scrollTrack">
    <div id="scrollThumb"></div>
  </div>

  <!-- Bottom controls -->
  <div class="bottom-layout">

    <!-- Left: place controls -->
    <div class="bottom-actions">
      <div id="noDancerNotice" class="no-dancer-notice" style="display:none;">
        아직 내 인형이 없어요!<br>
        <a href="create.html" style="font-weight:bold; color:inherit;">← CREATE</a>에서 인형을 만들고 저장해 주세요.
      </div>

      <div id="placeControls" style="display:none;">
        <div class="place-hint">
          광장에서 빈 곳을 클릭하거나 X 위치를 직접 입력해 내 인형을 배치하세요.
        </div>
        <div class="place-controls">
          <button class="btn btn-green" id="btnPlaceMode">CLICK TO PLACE</button>
          <span class="place-x-label">X =</span>
          <input type="number" id="placeXInput" min="80" max="3000" step="10" value="1400" />
          <button class="btn" id="btnPlaceAt">PLACE</button>
        </div>
      </div>

      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <a href="create.html" class="btn btn-green" style="font-size:0.72rem;">+ CREATE NEW</a>
        <button class="btn" id="btnAutoScroll" style="font-size:0.72rem;">AUTO SCROLL</button>
      </div>
    </div>

    <!-- Right: selected dancer info -->
    <div class="info-panel" id="infoPanel">
      <div class="info-panel-empty" id="infoEmpty">인형을 클릭하면 정보가 표시됩니다</div>
      <div id="infoContent" style="display:none;"></div>
    </div>

  </div>
</main>

<script src="js/dancer.js"></script>
<script src="js/storage.js"></script>
<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let selectedId  = null;
let placeModeOn = false;

// ── 3D PLAZA SCENE ───────────────────────────────────────────────────────────
const plazaContainer = document.getElementById('plazaContainer');
const plaza = new PlazaScene(plazaContainer);

// ── LOAD DANCERS ──────────────────────────────────────────────────────────────
function loadDancers() {
  const configs = DancerStorage.getAllDancers();
  plaza.loadDancers(configs);
  document.getElementById('dancerCount').textContent = configs.length + ' DANCERS';

  // Check if user has a dancer
  const hasMine = DancerStorage.loadUserDancers().length > 0;
  const hasCurrent = !!DancerStorage.getCurrent();
  if (!hasMine && !hasCurrent) {
    document.getElementById('noDancerNotice').style.display = 'block';
    document.getElementById('placeControls').style.display  = 'none';
  } else {
    document.getElementById('noDancerNotice').style.display = 'none';
    document.getElementById('placeControls').style.display  = 'block';
  }
}
loadDancers();

// ── PLAZA CALLBACKS ───────────────────────────────────────────────────────────
plaza.onSelect = (entry) => {
  if (entry) {
    selectedId = entry.id;
    showInfo(entry);
  } else {
    selectedId = null;
    showInfo(null);
  }
};

plaza.onPlace = (worldX) => {
  if (placeModeOn) {
    const pixelX = Math.round(worldX * 55);
    placeDancerAt(pixelX);
    placeModeOn = false;
    plaza.placeMode = false;
    document.getElementById('btnPlaceMode').textContent = 'CLICK TO PLACE';
  }
};

// Start the 3D scene
plaza.start();

// ── SCROLLBAR (simplified — maps to plaza camera) ─────────────────────────────
const scrollTrack = document.getElementById('scrollTrack');
const scrollThumb = document.getElementById('scrollThumb');

function updateScrollThumb() {
  const lim = plaza._camLimits;
  const range = lim.max - lim.min;
  if (range <= 0) return;
  const trackW = scrollTrack.clientWidth;
  const thumbW = Math.max(40, trackW * 0.15);
  const progress = (plaza._camCurrentX - lim.min) / range;
  const thumbX = progress * (trackW - thumbW);
  scrollThumb.style.width = thumbW + 'px';
  scrollThumb.style.left  = Math.max(0, thumbX) + 'px';
}
setInterval(updateScrollThumb, 100);

// Drag scrollbar
let thumbDrag = false, thumbStartX = 0, thumbStartCam = 0;
scrollThumb.addEventListener('mousedown', e => {
  thumbDrag = true; thumbStartX = e.clientX;
  thumbStartCam = plaza._camTargetX; e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!thumbDrag) return;
  const lim = plaza._camLimits;
  const range = lim.max - lim.min;
  const trackW = scrollTrack.clientWidth;
  const thumbW = Math.max(40, trackW * 0.15);
  const delta = e.clientX - thumbStartX;
  plaza._camTargetX = thumbStartCam + delta * range / (trackW - thumbW);
});
document.addEventListener('mouseup', () => { thumbDrag = false; });

// Click on track
scrollTrack.addEventListener('click', e => {
  if (thumbDrag) return;
  const rect = scrollTrack.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const lim = plaza._camLimits;
  const range = lim.max - lim.min;
  plaza._camTargetX = lim.min + (clickX / scrollTrack.clientWidth) * range;
});

// ── INFO PANEL ────────────────────────────────────────────────────────────────
function showInfo(d) {
  const empty   = document.getElementById('infoEmpty');
  const content = document.getElementById('infoContent');

  if (!d) {
    empty.style.display   = 'flex';
    content.style.display = 'none';
    return;
  }

  empty.style.display   = 'none';
  content.style.display = 'block';

  const cfg = d.config;
  const color = DANCER_COLORS[cfg.colorIndex] || DANCER_COLORS[0];
  const isUser = !cfg.isSample;

  content.innerHTML = `
    <div style="font-size:0.9rem; font-weight:900; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:10px; border-bottom:2px solid #000; padding-bottom:6px;">
      ${cfg.name || d.id}
    </div>
    <div class="dancer-info-grid">
      <div>
        <div class="di-key">COLOR</div>
        <div class="di-val">
          <span class="di-swatch" style="background:${color.bodyHex}"></span>${color.name}
        </div>
      </div>
      <div>
        <div class="di-key">EYES</div>
        <div class="di-val">STYLE ${cfg.faceStyle + 1}</div>
      </div>
      <div>
        <div class="di-key">MOUTH</div>
        <div class="di-val">STYLE ${cfg.mouthStyle !== undefined ? cfg.mouthStyle + 1 : 1}</div>
      </div>
      <div>
        <div class="di-key">DECO</div>
        <div class="di-val">${cfg.decoration > 0 ? `STYLE ${cfg.decoration}` : 'NONE'}</div>
      </div>
      <div>
        <div class="di-key">HAT</div>
        <div class="di-val">${cfg.hatStyle > 0 ? `STYLE ${cfg.hatStyle}` : 'NONE'}</div>
      </div>
      <div>
        <div class="di-key">TEXT</div>
        <div class="di-val">${cfg.bodyText || '—'}</div>
      </div>
      <div>
        <div class="di-key">TYPE</div>
        <div class="di-val">${isUser ? '★ MY DANCER' : 'SAMPLE'}</div>
      </div>
    </div>
    <button class="btn delete-btn" onclick="deleteDancer('${d.id}', ${cfg.isSample})">DELETE</button>
  `;
}

// ── PLACE DANCER ──────────────────────────────────────────────────────────────
function placeDancerAt(x) {
  const users = DancerStorage.loadUserDancers();
  if (users.length === 0) {
    alert('먼저 CREATE에서 인형을 만들고 저장해 주세요.');
    return;
  }
  const last = users[users.length - 1];
  DancerStorage.updatePosition(last.id, x);
  plaza.updateDancerPosition(last.id, x);
  document.getElementById('placeXInput').value = x;
}

document.getElementById('btnPlaceMode').addEventListener('click', () => {
  const users = DancerStorage.loadUserDancers();
  if (users.length === 0) {
    alert('먼저 CREATE에서 인형을 만들고 저장해 주세요.');
    return;
  }
  placeModeOn = !placeModeOn;
  plaza.placeMode = placeModeOn;
  document.getElementById('btnPlaceMode').textContent = placeModeOn ? 'CANCEL (ESC)' : 'CLICK TO PLACE';
});

document.getElementById('btnPlaceAt').addEventListener('click', () => {
  const x = parseInt(document.getElementById('placeXInput').value, 10);
  if (!isNaN(x)) placeDancerAt(Math.max(80, Math.min(3100, x)));
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && placeModeOn) {
    placeModeOn = false;
    plaza.placeMode = false;
    document.getElementById('btnPlaceMode').textContent = 'CLICK TO PLACE';
  }
});

// ── DELETE DANCER ─────────────────────────────────────────────────────────────
function deleteDancer(id, isSample) {
  if (!confirm('이 인형을 삭제할까요?')) return;
  
  if (isSample) {
    // 샘플인 경우 로컬 스토리지의 삭제된 샘플 목록에 추가하여 영구 제외
    DancerStorage.deleteSample(id);
  } else {
    // 유저가 만든 인형인 경우 스토리지에서 완전 삭제
    DancerStorage.removeDancer(id);
  }
  
  selectedId = null;
  showInfo(null);
  loadDancers();
}

// ── AUTO SCROLL ───────────────────────────────────────────────────────────────
let autoScrollOn = false;
let autoScrollDir = 1;

document.getElementById('btnAutoScroll').addEventListener('click', () => {
  autoScrollOn = !autoScrollOn;
  document.getElementById('btnAutoScroll').textContent = autoScrollOn ? 'STOP' : 'AUTO SCROLL';
  if (autoScrollOn) document.getElementById('btnAutoScroll').classList.add('btn-green');
  else              document.getElementById('btnAutoScroll').classList.remove('btn-green');
});

// Auto-scroll via interval that nudges the camera target
setInterval(() => {
  if (!autoScrollOn) return;
  const lim = plaza._camLimits;
  plaza._camTargetX += autoScrollDir * 0.08;
  if (plaza._camTargetX >= lim.max) { plaza._camTargetX = lim.max; autoScrollDir = -1; }
  if (plaza._camTargetX <= lim.min) { plaza._camTargetX = lim.min; autoScrollDir =  1; }
}, 30);
</script>
</body>
</html>
