<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GALLERY — AIR DANCER</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .dancer-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(280px, 30vw, 420px);
      background: linear-gradient(180deg, #ffffff 0%, #d8dcff 100%);
      border: 2px solid #39FF14;
      padding: 28px 32px 32px;
      z-index: 200;
      display: none;
      font-family: "Noto Serif", serif;
      color: #E8007F;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .dancer-popup.open { display: block; }
    
    .popup-close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 1.5rem;
      cursor: pointer;
      color: #E8007F;
    }

    .dancer-popup .ap-title {
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      font-weight: 700;
      margin-bottom: 15px;
      color: #E8007F;
      line-height: 1.3;
      border-bottom: 2px solid #E8007F;
      padding-bottom: 5px;
      text-transform: uppercase;
    }
    
    .dancer-popup .ap-body {
      font-size: clamp(0.8rem, 1.1vw, 0.95rem);
      font-weight: 400;
      line-height: 1.65;
      color: #E8007F;
      margin-bottom: 20px;
    }
    
    .popup-btn-row {
      display: flex;
      gap: 8px;
    }
    .delete-btn, .download-btn {
      flex: 1;
      border: 1px solid #000;
      padding: 8px 10px;
      font-family: "Noto Serif", serif;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
      font-size: 0.78rem;
    }
    .delete-btn {
      background: #E8007F;
      color: #fff;
    }
    .delete-btn:hover { background: #ff1a9c; }
    .download-btn {
      background: #39FF14;
      color: #000;
      position: relative;
    }
    .download-btn:hover { background: #55ff33; }

    .download-menu {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0; right: 0;
      background: #fff;
      border: 1.5px solid #39FF14;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
      z-index: 10;
    }
    .download-menu.open { display: block; }
    .download-menu button {
      display: block;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      font-family: "Noto Serif", serif;
      font-weight: bold;
      font-size: 0.78rem;
      text-transform: uppercase;
      cursor: pointer;
      text-align: left;
      color: #000;
    }
    .download-menu button:hover { background: #e8ffe8; }
    .download-menu button + button { border-top: 1px solid #ccc; }

    /* Dim overlay */
    .popup-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 190;
      display: none;
    }
    .popup-overlay.open { display: block; }

    @media (max-width: 700px) {
      .plaza-area { border: none; }
    }

    /* ── INFO BAR ── */
    .info-bar {
      border-bottom: var(--border);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      background: rgba(127, 146, 255, 0.25);
      backdrop-filter: blur(4px);
    }

    .info-bar-title {
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: "Noto Serif", serif;
    }

    .info-bar-count {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      opacity: 0.6;
      font-family: "Noto Serif", serif;
    }

    .info-bar-spacer { flex: 1; }

    /* ── PLAZA CANVAS AREA ── */
    .plaza-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: transparent;
      border-bottom: var(--border);
    }

    #plazaCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #plazaCanvas:active { cursor: grabbing; }
    #plazaCanvas.place-mode { cursor: crosshair; }

    /* ── SCROLLBAR ── */
    .plaza-scroll-track {
      height: 14px;
      border-top: var(--border);
      background: rgba(255,255,255,0.3);
      position: relative;
      cursor: pointer;
    }

    #scrollThumb {
      position: absolute;
      top: 2px;
      height: 10px;
      min-width: 40px;
      background: linear-gradient(90deg, #5F84FF, #91D271);
      border: 1.5px solid var(--black);
      cursor: grab;
    }

    /* ── BOTTOM PANEL ── */
    .bottom-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      border-top: var(--border);
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(6px);
      max-height: 180px;
    }

    .bottom-actions {
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-right: var(--border);
      overflow-y: auto;
    }

    .place-hint {
      font-size: 0.68rem;
      line-height: 1.6;
      letter-spacing: 0.06em;
      opacity: 0.7;
      font-family: "Noto Serif", serif;
    }

    .place-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .place-x-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
      font-family: "Noto Serif", serif;
    }

    #placeXInput {
      width: 80px;
      border: var(--border);
      padding: 4px 8px;
      font-family: var(--font);
      font-size: 0.78rem;
      border-radius: 0;
      outline: none;
      background: rgba(255,255,255,0.7);
    }

    /* no dancer notice */
    .no-dancer-notice {
      border: var(--border);
      background: rgba(255,255,255,0.6);
      padding: 10px 14px;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      line-height: 1.6;
      font-family: "Noto Serif", serif;
    }

    @media (max-width: 700px) {
      body { height: auto; overflow: auto; }
      main { overflow: visible; }
      .plaza-area { height: 55vw; flex: none; }
      .bottom-layout { grid-template-columns: 1fr; max-height: none; }
      .bottom-actions { border-right: none; border-bottom: var(--border); }
    }
  </style>
</head>
<body>

<header class="top-gradient-header">
  <a href="index.html" class="top-logo">
    <img src="Image/logo-flat.svg" alt="Wobby">
  </a>
</header>

<main style="position: relative;">
  <!-- PLAZA AREA -->
  <div class="plaza-area">
    <div id="plazaCanvas"></div>
  </div>

  <!-- POPUP OVERLAY -->
  <div class="popup-overlay" id="popupOverlay"></div>

  <!-- POPUP -->
  <div class="dancer-popup" id="dancerPopup">
    <div class="popup-close" id="popupClose">&times;</div>
    <div class="ap-title" id="popupTitle">DANCER NAME</div>
    <div class="ap-body" id="popupBody">
      <!-- Info goes here -->
    </div>
    <div id="popupFooter">
      <!-- Delete button goes here -->
    </div>
  </div>


</main>

<script src="js/dancer.js"></script>
<script src="js/storage.js"></script>
<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let selectedId  = null;
let placeModeOn = false;

// ── 3D PLAZA SCENE ───────────────────────────────────────────────────────────
const plazaContainer = document.getElementById('plazaCanvas');
const plaza = new PlazaScene(plazaContainer);

// ── LOAD DANCERS ──────────────────────────────────────────────────────────────
function loadDancers() {
  const configs = DancerStorage.getAllDancers();
  plaza.loadDancers(configs);
}
loadDancers();

// ── PLAZA CALLBACKS ───────────────────────────────────────────────────────────
plaza.onSelect = (entry) => {
  if (entry) {
    selectedId = entry.id;
    showInfo(entry);
  } else {
    selectedId = null;
    showInfo(null);
  }
};

plaza.onPlace = (worldX) => {
  // place mode removed
};

// Start the 3D scene
plaza.start();

// 홈화면과 동일한 하늘색 배경 설정
plaza.scene.background = new THREE.Color(0x9fc8ef);

// ── INFO POPUP ────────────────────────────────────────────────────────────────
function showInfo(d) {
  const popup = document.getElementById('dancerPopup');
  const overlay = document.getElementById('popupOverlay');
  
  if (!d) {
    popup.classList.remove('open');
    overlay.classList.remove('open');
    return;
  }

  const cfg = d.config;
  const color = DANCER_COLORS[cfg.colorIndex] || DANCER_COLORS[0];
  const isUser = !cfg.isSample;

  document.getElementById('popupTitle').textContent = cfg.name || d.id;
  
  document.getElementById('popupBody').innerHTML = `
    <div><strong>COLOR:</strong> ${color.name}</div>
    <div><strong>EYES:</strong> STYLE ${(cfg.eyeStyle !== undefined ? cfg.eyeStyle : 0) + 1}</div>
    <div><strong>DECO:</strong> ${cfg.decoration > 0 ? `STYLE ${cfg.decoration}` : 'NONE'}</div>
    <div><strong>HAT:</strong> ${cfg.hatStyle > 0 ? `STYLE ${cfg.hatStyle}` : 'NONE'}</div>
    <div><strong>TEXT:</strong> ${cfg.bodyText || '—'}</div>
    <div><strong>TYPE:</strong> ${isUser ? '★ MY DANCER' : 'SAMPLE'}</div>
  `;

  document.getElementById('popupFooter').innerHTML = `
    <div class="popup-btn-row">
      <button class="btn delete-btn" onclick="deleteDancer('${d.id}', ${cfg.isSample})">DELETE</button>
      <div style="position:relative; flex:1;">
        <button class="download-btn" style="width:100%" onclick="toggleDownloadMenu(event)">DOWNLOAD ▲</button>
        <div class="download-menu" id="downloadMenu">
          <button onclick="downloadDancer('image')">IMAGE (PNG)</button>
          <button onclick="downloadDancer('video')">VIDEO (WEBM)</button>
        </div>
      </div>
    </div>
  `;

  popup.classList.add('open');
  overlay.classList.add('open');
}

document.getElementById('popupClose').addEventListener('click', () => {
  showInfo(null);
});
document.getElementById('popupOverlay').addEventListener('click', () => {
  showInfo(null);
});



// ── PLACE DANCER (UI REMOVED) ───────────────────────────────────────────────────

// ── DELETE DANCER ─────────────────────────────────────────────────────────────
function deleteDancer(id, isSample) {
  if (!confirm('이 인형을 삭제할까요?')) return;
  
  if (isSample) {
    // 샘플인 경우 로컬 스토리지의 삭제된 샘플 목록에 추가하여 영구 제외
    DancerStorage.deleteSample(id);
  } else {
    // 유저가 만든 인형인 경우 스토리지에서 완전 삭제
    DancerStorage.removeDancer(id);
  }
  
  selectedId = null;
  showInfo(null);
  loadDancers();
}

// ── DOWNLOAD ──────────────────────────────────────────────────────────────────
function toggleDownloadMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('downloadMenu');
  menu.classList.toggle('open');
}

document.addEventListener('click', () => {
  const menu = document.getElementById('downloadMenu');
  if (menu) menu.classList.remove('open');
});

function downloadDancer(type) {
  const menu = document.getElementById('downloadMenu');
  if (menu) menu.classList.remove('open');

  // 현재 선택된 댄서 config 가져오기
  const entry = plaza._entries.find(e => e.id === selectedId);
  if (!entry) return;
  const cfg = entry.config;
  const name = (cfg.name || selectedId).replace(/\s+/g, '_');

  // 오프스크린 컨테이너에 DancerScene 생성
  const offDiv = document.createElement('div');
  offDiv.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:400px;height:500px;';
  document.body.appendChild(offDiv);

  const scene = new DancerScene(offDiv);
  scene.setDancer(AirDancer.fromConfig(cfg));
  scene.start();

  if (type === 'image') {
    // 몇 프레임 후 캡처 (애니메이션 시작 대기)
    setTimeout(() => {
      scene.renderer.render(scene.scene, scene.camera);
      const url = scene.renderer.domElement.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url;
      a.download = `${name}.png`;
      a.click();
      scene.dispose();
      document.body.removeChild(offDiv);
    }, 300);

  } else {
    // VIDEO: MediaRecorder로 3초 녹화
    const stream = scene.renderer.domElement.captureStream(30);
    const chunks = [];
    const rec = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
    rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    rec.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${name}.webm`;
      a.click();
      URL.revokeObjectURL(url);
      scene.dispose();
      document.body.removeChild(offDiv);
    };
    rec.start();
    setTimeout(() => rec.stop(), 3000);
  }
}

// ── AUTO SCROLL ───────────────────────────────────────────────────────────────
let autoScrollOn = false;
let autoScrollDir = 1;

document.getElementById('btnAutoScroll').addEventListener('click', () => {
  autoScrollOn = !autoScrollOn;
  document.getElementById('btnAutoScroll').textContent = autoScrollOn ? 'STOP' : 'AUTO SCROLL';
  if (autoScrollOn) document.getElementById('btnAutoScroll').classList.add('btn-green');
  else              document.getElementById('btnAutoScroll').classList.remove('btn-green');
});

// Auto-scroll via interval that nudges the camera target
setInterval(() => {
  if (!autoScrollOn) return;
  const lim = plaza._camLimits;
  plaza._camTargetX += autoScrollDir * 0.08;
  if (plaza._camTargetX >= lim.max) { plaza._camTargetX = lim.max; autoScrollDir = -1; }
  if (plaza._camTargetX <= lim.min) { plaza._camTargetX = lim.min; autoScrollDir =  1; }
}, 30);
</script>
</body>
</html>
