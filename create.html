<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREATE — AIR DANCER</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    main { flex: 1; overflow: hidden; }

    .split-left { overflow-y: auto; }

    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f4f4f4;
      border-bottom: var(--border);
      position: relative;
      padding: 20px;
    }

    #previewCanvas { display: block; background: transparent; }

    .preview-label {
      position: absolute;
      top: 12px; left: 16px;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.45;
    }

    .preview-name {
      position: absolute;
      bottom: 14px; left: 0; right: 0;
      text-align: center;
      font-size: 0.72rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* 색깔 선택 그리드 */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .color-swatch {
      aspect-ratio: 1;
      border: 2.5px solid var(--black);
      cursor: pointer;
      position: relative;
      transition: transform 0.08s;
    }
    .color-swatch:hover { transform: scale(1.08); }
    .color-swatch.selected::after {
      content: '';
      position: absolute;
      inset: 3px;
      border: 2.5px solid rgba(0,0,0,0.6);
    }

    .color-swatch-name {
      font-size: 0.52rem;
      letter-spacing: 0.06em;
      text-align: center;
      margin-top: 3px;
      text-transform: uppercase;
    }

    /* 눈 디자인 선택 그리드 */
    .eye-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .eye-option {
      border: 2.5px solid var(--black);
      cursor: pointer;
      background: #e8e8e8;   /* 회색 배경: 흰 배경 눈 이미지도 보이도록 */
      padding: 5px;
      transition: transform 0.08s;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 2 / 1;
      overflow: hidden;
    }

    .eye-option:hover { transform: scale(1.05); }

    /* 선택된 옵션: 녹색 테두리 + 연한 녹색 배경 */
    .eye-option.selected {
      border-color: var(--green);
      background:   #d0ffc8;
    }

    .eye-option img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      image-rendering: auto;
    }

    .opt-section { margin-bottom: 4px; }
    .opt-section:last-child { margin-bottom: 0; }

    .panel-body { padding: 14px 16px; display: none; }
    .panel-body.open { display: block; }

    .info-bar {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      opacity: 0.5;
      text-transform: uppercase;
      padding: 8px 16px;
      border-bottom: 2px solid #e0e0e0;
    }

    @media (max-width: 700px) {
      body { height: auto; overflow: auto; }
      main { overflow: visible; }
      .split { grid-template-columns: 1fr; min-height: auto; }
      .split-left { max-height: 55vh; }
      .preview-area { min-height: 340px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="site-logo">AIR DANCER</a>
  <nav class="site-nav">
    <a href="create.html" class="active">CREATE</a>
    <a href="dance.html">DANCE</a>
    <a href="gallery.html">GALLERY</a>
  </nav>
</header>

<main>
  <div class="split">

    <!-- ── 왼쪽: 커스터마이즈 패널들 ── -->
    <div class="split-left">
      <div class="info-bar">프리셋을 조합해 나만의 인형을 만드세요</div>

      <!-- BODY COLOR (몸통 색깔) -->
      <div class="panel opt-section">
        <div class="panel-header open" data-panel="bodycolor">
          <span>BODY COLOR 몸통색</span><span class="plus">+</span>
        </div>
        <div class="panel-body open" id="panel-bodycolor">
          <div class="color-grid" id="bodyColorGrid"></div>
        </div>
      </div>

      <!-- ARM COLOR (팔 색깔) — 1단계 신규 추가 -->
      <div class="panel opt-section">
        <div class="panel-header open" data-panel="armcolor">
          <span>ARM COLOR 팔색</span><span class="plus">+</span>
        </div>
        <div class="panel-body open" id="panel-armcolor">
          <div class="color-grid" id="armColorGrid"></div>
        </div>
      </div>

      <!-- EYES (눈 디자인) — 이미지 썸네일로 선택 -->
      <div class="panel opt-section">
        <div class="panel-header open" data-panel="eyes">
          <span>EYES 눈</span><span class="plus">+</span>
        </div>
        <div class="panel-body open" id="panel-eyes">
          <div class="eye-grid" id="eyeGrid"></div>
        </div>
      </div>

      <!-- DECORATION (몸통 장식) -->
      <div class="panel opt-section">
        <div class="panel-header open" data-panel="deco">
          <span>DECORATION 장식</span><span class="plus">+</span>
        </div>
        <div class="panel-body open" id="panel-deco">
          <div class="eye-grid" id="decoGrid"></div>
        </div>
      </div>

      <!-- HAT (모자) -->
      <div class="panel opt-section">
        <div class="panel-header open" data-panel="hat">
          <span>HAT 모자</span><span class="plus">+</span>
        </div>
        <div class="panel-body open" id="panel-hat">
          <div class="eye-grid" id="hatGrid"></div>
        </div>
      </div>

      <!-- MOUTH (입 디자인) -->
      <div class="panel opt-section">
        <div class="panel-header open" data-panel="mouth">
          <span>MOUTH 입</span><span class="plus">+</span>
        </div>
        <div class="panel-body open" id="panel-mouth">
          <div class="eye-grid" id="mouthGrid"></div>
        </div>
      </div>

      <!-- BODY TEXT (몸통 글자) -->
      <div class="panel opt-section">
        <div class="panel-header open" data-panel="text">
          <span>BODY TEXT 글자</span><span class="plus">+</span>
        </div>
        <div class="panel-body open" id="panel-text">
          <span class="label">몸통 원통에 세로로 쓰여집니다 (최대 10자)</span>
          <input class="input-field" id="bodyTextInput" type="text" maxlength="10"
                 placeholder="DANCE / YEAH / ..." />
        </div>
      </div>

      <!-- BUILDING (빌딩 설정) -->
      <div class="panel opt-section">
        <div class="panel-header open" data-panel="building">
          <span>BUILDING 빌딩 설정</span><span class="plus">+</span>
        </div>
        <div class="panel-body open" id="panel-building">
          <span class="label">1. 빌딩 클릭 시 이동할 웹사이트 URL</span>
          <input class="input-field" id="buildingUrlInput" type="url"
                 placeholder="https://github.com" style="margin-bottom: 12px;" />
          <span class="label">2. 빌딩 정면에 입힐 이미지 업로드</span>
          <input type="file" id="buildingImageInput" accept="image/*" style="font-size: 0.7rem; width:100%;" />
        </div>
      </div>

      <!-- NAME (인형 이름) -->
      <div class="panel opt-section">
        <div class="panel-header open" data-panel="name">
          <span>NAME 이름</span><span class="plus">+</span>
        </div>
        <div class="panel-body open" id="panel-name">
          <span class="label">내 광고풍선인형의 이름</span>
          <input class="input-field" id="dancerNameInput" type="text" maxlength="20"
                 placeholder="DANCER #001" />
        </div>
      </div>

    </div><!-- /split-left -->

    <!-- ── 오른쪽: 3D 미리보기 ── -->
    <div class="split-right" style="flex-direction:column;">
      <div class="preview-area" style="flex:1; width:100%; position:relative;">
        <span class="preview-label">LIVE PREVIEW</span>
        <div id="previewCanvas" style="width:100%; height:100%;"></div>
        <span class="preview-name" id="previewName">DANCER #001</span>
      </div>

      <div class="bottom-bar">
        <button class="btn btn-green" id="btnSaveGallery">SAVE TO GALLERY →</button>
        <a href="dance.html" class="btn" id="btnDance">GO DANCE ↗</a>
        <button class="btn" id="btnRandom" title="랜덤 조합">RANDOM</button>
      </div>
    </div>

  </div>
</main>

<script src="js/dancer.js"></script>
<script src="js/storage.js"></script>
<script>
// ── 현재 인형 설정 (로컬 스토리지에서 복원 또는 기본값) ──────────────────────
const config = {
  colorIndex:    0,
  armColorIndex: 0,
  eyeStyle:      0,
  decoration:    0,
  hatStyle:      0,
  mouthStyle:    0,
  bodyText:      '',
  name:          '',
  ...( DancerStorage.getCurrent() || {} )
};

// ── 3D 씬 초기화 ──────────────────────────────────────────────────────────────
const dancer          = new AirDancer(config);
const previewContainer = document.getElementById('previewCanvas');
const dancerScene      = new DancerScene(previewContainer);
dancerScene.setDancer(dancer);
dancerScene.start();

// ── 색깔 그리드 빌더 (몸통용 / 팔용 공통 함수) ───────────────────────────────

/**
 * buildColorGrid(containerId, configKey, onChangeFn)
 *
 * @param {string}   containerId  - 색 스와치를 넣을 그리드 div ID
 * @param {string}   configKey    - config 에서 바꿀 키 ('colorIndex' 또는 'armColorIndex')
 * @param {Function} onChangeFn   - 색 변경 시 호출할 함수 (dancer 업데이트 담당)
 */
function buildColorGrid(containerId, configKey, onChangeFn) {
  const grid = document.getElementById(containerId);
  DANCER_COLORS.forEach((c, i) => {
    const wrap   = document.createElement('div');
    const swatch = document.createElement('div');

    swatch.className = 'color-swatch' + (i === config[configKey] ? ' selected' : '');
    swatch.style.background = c.bodyHex;
    // 흰색 스와치는 테두리로만 구분
    swatch.style.outline = c.bodyHex === '#FFFFFF' ? '2.5px solid #ccc' : '';
    swatch.title = c.name;

    swatch.addEventListener('click', () => {
      // 같은 그리드 안의 기존 선택 해제
      grid.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      swatch.classList.add('selected');
      config[configKey]         = i;
      dancer.config[configKey]  = i;
      onChangeFn();
      sync();
    });

    const label = document.createElement('div');
    label.className   = 'color-swatch-name';
    label.textContent = c.name.split(' ')[0];   // 첫 단어만 표시 (짧게)

    wrap.appendChild(swatch);
    wrap.appendChild(label);
    grid.appendChild(wrap);
  });
}

// 몸통 색 그리드: 변경 시 updateColor() 호출 (텍스처 재생성 + 팔 색 갱신)
buildColorGrid('bodyColorGrid', 'colorIndex', () => dancer.updateColor());

// 팔 색 그리드: 변경 시 updateArmColor() 호출 (팔 재질만 갱신)
buildColorGrid('armColorGrid', 'armColorIndex', () => dancer.updateArmColor());

// ── 태그 그룹 빌더 (표정·장식·모자) ─────────────────────────────────────────

/**
 * buildTagGroup(containerId, items, configKey)
 *
 * @param {string}   containerId - 태그를 넣을 div ID
 * @param {string[]} items       - 선택지 이름 배열
 * @param {string}   configKey  - config 에서 바꿀 키
 */
function buildTagGroup(containerId, items, configKey) {
  const group = document.getElementById(containerId);
  items.forEach((name, i) => {
    const tag = document.createElement('span');
    tag.className   = 'tag' + (i === config[configKey] ? ' selected' : '');
    tag.textContent = name;

    tag.addEventListener('click', () => {
      group.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
      tag.classList.add('selected');
      config[configKey]        = i;
      dancer.config[configKey] = i;
      dancer.rebuild();   // 형태가 바뀌므로 전체 재생성
      sync();
    });

    group.appendChild(tag);
  });
}

// ── 눈 이미지 그리드 ─────────────────────────────────────────────────────────
// EYE_IMAGES 는 dancer.js 에 선언된 배열입니다.
// dancer.js 가 먼저 로드되므로 여기서 바로 사용할 수 있습니다.
const eyeGrid = document.getElementById('eyeGrid');

EYE_IMAGES.forEach((src, i) => {
  const div = document.createElement('div');
  div.className = 'eye-option' + (i === config.eyeStyle ? ' selected' : '');

  const img = document.createElement('img');
  img.src = src;
  img.alt = `EYE ${i + 1}`;
  div.appendChild(img);

  div.addEventListener('click', () => {
    // 기존 선택 해제
    eyeGrid.querySelectorAll('.eye-option').forEach(d => d.classList.remove('selected'));
    div.classList.add('selected');
    config.eyeStyle        = i;
    dancer.config.eyeStyle = i;
    // 눈 이미지가 바뀌므로 형태 전체 재생성
    dancer.rebuild();
    sync();
  });

  eyeGrid.appendChild(div);
});

// ── 이미지 그리드 빌더 (decoration / hat / mouth 공통) ───────────────────────
/**
 * buildImageGrid(gridId, images, configKey)
 *  gridId    : 그리드 div ID
 *  images    : EYE_IMAGES 형태의 경로 배열 (인덱스 0 = 첫 번째 이미지)
 *  configKey : config / dancer.config 에서 바꾸는 키
 *              값 0 = NONE, 1부터 = images[0], images[1], …
 */
function buildImageGrid(gridId, images, configKey) {
  const grid = document.getElementById(gridId);

  // NONE 옵션
  const noneDiv = document.createElement('div');
  noneDiv.className = 'eye-option' + (config[configKey] === 0 ? ' selected' : '');
  noneDiv.style.fontSize = '0.58rem';
  noneDiv.style.letterSpacing = '0.05em';
  noneDiv.style.color = '#666';
  noneDiv.style.display = 'flex';
  noneDiv.style.alignItems = 'center';
  noneDiv.style.justifyContent = 'center';
  noneDiv.textContent = 'NONE';
  noneDiv.addEventListener('click', () => {
    grid.querySelectorAll('.eye-option').forEach(d => d.classList.remove('selected'));
    noneDiv.classList.add('selected');
    config[configKey]        = 0;
    dancer.config[configKey] = 0;
    dancer.rebuild();
    sync();
  });
  grid.appendChild(noneDiv);

  // 이미지 옵션들
  images.forEach((src, i) => {
    const val = i + 1;   // config 값: 1-based
    const div = document.createElement('div');
    div.className = 'eye-option' + (config[configKey] === val ? ' selected' : '');

    const img = document.createElement('img');
    img.src = src;
    img.alt = `${gridId} ${val}`;
    div.appendChild(img);

    div.addEventListener('click', () => {
      grid.querySelectorAll('.eye-option').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
      config[configKey]        = val;
      dancer.config[configKey] = val;
      dancer.rebuild();
      sync();
    });

    grid.appendChild(div);
  });
}

buildImageGrid('decoGrid',  DECO_IMAGES,  'decoration');
buildImageGrid('hatGrid',   HAT_IMAGES,   'hatStyle');
buildImageGrid('mouthGrid', MOUTH_IMAGES, 'mouthStyle');

// ── 텍스트 입력 ───────────────────────────────────────────────────────────────

document.getElementById('bodyTextInput').value = config.bodyText || '';
document.getElementById('bodyTextInput').addEventListener('input', e => {
  config.bodyText        = e.target.value;
  dancer.config.bodyText = e.target.value;
  // 텍스처를 다시 그려야 하므로 updateColor() 를 재활용합니다.
  // (updateColor 내부에서 _makeBodyTexture() 를 호출해 글자도 새로 그립니다)
  dancer.updateColor();
  sync();
});

document.getElementById('buildingUrlInput').value = config.buildingUrl || '';
document.getElementById('buildingUrlInput').addEventListener('change', e => {
  let val = e.target.value.trim();
  if (val && !val.startsWith('http://') && !val.startsWith('https://')) {
    val = 'https://' + val;
    e.target.value = val;
  }
  config.buildingUrl        = val;
  dancer.config.buildingUrl = val;
  // (URL 변경 시 텍스처는 이미지가 결정하므로 rebuild 생략)
  sync();
});

document.getElementById('buildingImageInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (event) => {
    const img = new Image();
    img.onload = () => {
      // 용량 최적화를 위해 Canvas로 리사이징 (최대 가로 512px)
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const MAX_WIDTH = 512;
      let width = img.width;
      let height = img.height;

      if (width > MAX_WIDTH) {
        height *= MAX_WIDTH / width;
        width = MAX_WIDTH;
      }

      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);

      // JPEG 압축으로 저장 용량 최소화
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      config.buildingImage = dataUrl;
      dancer.config.buildingImage = dataUrl;
      
      // 이미지 적용을 위해 빌딩 다시 생성
      dancer.rebuild();
      sync();
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('dancerNameInput').value = config.name || '';
document.getElementById('dancerNameInput').addEventListener('input', e => {
  config.name = e.target.value;
  document.getElementById('previewName').textContent = e.target.value || 'DANCER';
  sync();
});

// ── 아코디언 패널 열고 닫기 ───────────────────────────────────────────────────
document.querySelectorAll('.panel-header').forEach(header => {
  header.addEventListener('click', () => {
    const id   = header.dataset.panel;
    const body = document.getElementById('panel-' + id);
    const open = body.classList.toggle('open');
    header.classList.toggle('open', open);
    header.querySelector('.plus').style.transform = open ? 'rotate(45deg)' : '';
  });
  // 초기 상태: 모두 열림
  header.classList.add('open');
  header.querySelector('.plus').style.transform = 'rotate(45deg)';
});

// ── 설정 저장 (로컬 스토리지) ────────────────────────────────────────────────

function sync() {
  DancerStorage.setCurrent({ ...config });
}

// ── 액션 버튼들 ───────────────────────────────────────────────────────────────

document.getElementById('btnSaveGallery').addEventListener('click', () => {
  const saved = DancerStorage.addDancer({ ...config });
  DancerStorage.clearCurrent();
  alert(`"${saved.name}" 이(가) 갤러리에 저장되었습니다!`);
  window.location.href = 'gallery.html';
});

document.getElementById('btnDance').addEventListener('click', () => {
  DancerStorage.setCurrent({ ...config });
  window.location.href = 'dance.html';
});

// RANDOM 버튼: 몸통 색 + 팔 색 + 눈 + 장식 + 모자를 모두 무작위로 바꿉니다.
document.getElementById('btnRandom').addEventListener('click', () => {
  config.colorIndex    = Math.floor(Math.random() * DANCER_COLORS.length);
  config.armColorIndex = Math.floor(Math.random() * DANCER_COLORS.length);
  config.eyeStyle      = Math.floor(Math.random() * EYE_IMAGES.length);
  config.decoration    = Math.floor(Math.random() * (DECO_IMAGES.length + 1));  // 0=NONE
  config.hatStyle      = Math.floor(Math.random() * (HAT_IMAGES.length  + 1));  // 0=NONE
  config.mouthStyle    = Math.floor(Math.random() * (MOUTH_IMAGES.length + 1)); // 0=기본

  Object.assign(dancer.config, config);
  dancer.rebuild();
  rebuildUI();
  sync();
});

/**
 * rebuildUI()
 *
 * config 값에 맞게 UI(스와치 선택 표시, 태그 선택 표시)를 다시 그립니다.
 * RANDOM 버튼 후처리에 사용합니다.
 */
function rebuildUI() {
  // 몸통 색 스와치
  document.getElementById('bodyColorGrid')
    .querySelectorAll('.color-swatch').forEach((s, i) => {
      s.classList.toggle('selected', i === config.colorIndex);
    });

  // 팔 색 스와치
  document.getElementById('armColorGrid')
    .querySelectorAll('.color-swatch').forEach((s, i) => {
      s.classList.toggle('selected', i === config.armColorIndex);
    });

  // 눈 디자인 그리드
  document.getElementById('eyeGrid')
    .querySelectorAll('.eye-option').forEach((d, i) => {
      d.classList.toggle('selected', i === config.eyeStyle);
    });

  // 이미지 그리드 (decoration, hat, mouth)
  // 이미지 그리드는 [NONE, img1, img2, …] 순서이므로
  // config 값 0 → 인덱스 0(NONE), config 값 n → 인덱스 n
  [
    ['decoGrid',  'decoration'],
    ['hatGrid',   'hatStyle'],
    ['mouthGrid', 'mouthStyle'],
  ].forEach(([id, key]) => {
    document.getElementById(id).querySelectorAll('.eye-option').forEach((d, i) => {
      d.classList.toggle('selected', i === config[key]);
    });
  });
}

// ── 이름 표시 초기화 ─────────────────────────────────────────────────────────
document.getElementById('previewName').textContent = config.name || 'DANCER';
</script>
